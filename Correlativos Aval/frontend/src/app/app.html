<mat-sidenav-container class="sidenav-container" autosize>
  
  <!-- PANEL LATERAL (SIDEBAR) con efecto Glass -->
  <mat-sidenav #sidenav mode="side" opened class="sidenav">
    <div class="sidenav-header">
      <div class="logo-container">
        <mat-icon class="logo-icon">account_balance</mat-icon>
      </div>
      <div class="header-text">
        <span class="app-title">Gestión DTI</span>
        <span class="app-subtitle">Portal Administrativo</span>
      </div>
    </div>

    <mat-nav-list class="nav-list">
      <div class="nav-section-label">PLATAFORMA</div>
      
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Panel Principal</span>
      </a>

      <a mat-list-item routerLink="/avales/registro" routerLinkActive="active-link">
        <mat-icon matListItemIcon>add_task</mat-icon>
        <span matListItemTitle>Gestión de Avales</span>
      </a>

      <a mat-list-item routerLink="/inventario" routerLinkActive="active-link">
        <mat-icon matListItemIcon>manage_search</mat-icon>
        <span matListItemTitle>Inventario</span>
      </a>

      <div class="nav-divider"></div>
      
      <div class="nav-footer">
        <div class="version-tag">v2.0 Premium</div>
      </div>
    </mat-nav-list>
  </mat-sidenav>

  <!-- CONTENIDO PRINCIPAL con Toolbar Transparente -->
  <mat-sidenav-content class="sidenav-content">
    <mat-toolbar class="main-toolbar">
      <button mat-icon-button (click)="sidenav.toggle()" class="menu-button">
        <mat-icon>menu_open</mat-icon>
      </button>
      
      <span class="toolbar-title">Portal de Gestión Administrativa</span>
      
      <span class="spacer"></span>
      
      <span class="spacer"></span>
    </mat-toolbar>

    <main class="main-container">
      <div class="content-wrapper">
        <router-outlet></router-outlet>
      </div>
    </main>
  </mat-sidenav-content>

</mat-sidenav-container>
