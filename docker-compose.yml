version: '3.9'

services:
  backend:
    build:
      context: "./Correlativos Aval/backend"
      dockerfile: "../../Dockerfile.backend"
    container_name: correlativos-backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      ENVIRONMENT: development
      PORT: 3000
      HOST: 0.0.0.0
      JWT_SECRET: dev-secret-change-in-production
      BCRYPT_ROUNDS: 10
      DB_PATH: /app/database/avales.db
      CORS_ORIGIN: "*"
      LOG_LEVEL: verbose
    volumes:
      - "./Correlativos Aval/database:/app/database"
      - "./Correlativos Aval/backend/src:/app/src"
    networks:
      - correlativos-net
    depends_on:
      - frontend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: "./Correlativos Aval/frontend"
      dockerfile: "../../Dockerfile.frontend"
    container_name: correlativos-frontend
    ports:
      - "80:80"
    environment:
      ENVIRONMENT: development
    volumes:
      - "./nginx.conf:/etc/nginx/nginx.conf:ro"
    networks:
      - correlativos-net
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  correlativos-net:
    driver: bridge

volumes:
  database:
    driver: local
